name: Build Samsung Exynos 9810 Kernel with KSU Next

on:
  workflow_dispatch: # Allows you to manually trigger the build with a button

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential libncurses5-dev libssl-dev bison flex libelf-dev glibc-source libcap-dev gcc-aarch64-linux-gnu jq curl git zip

    - name: Clone Kernel Source
      run: |
        git clone --depth=1 https://github.com/ExyHyperBrick/android_kernel_samsung_exynos9810.git kernel-src
        cd kernel-src

    - name: Patch KernelSU Next
      run: |
        cd kernel-src
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s next

    - name: Configure Defconfig for KSU
      run: |
        cd kernel-src
        # Inject required KSU configurations into the Samsung Exynos 9810 config file
        echo "CONFIG_MODULES=y" >> arch/arm64/configs/exynos9810-universal_defconfig
        echo "CONFIG_KSU=y" >> arch/arm64/configs/exynos9810-universal_defconfig
        echo "CONFIG_KSU_NEXT=y" >> arch/arm64/configs/exynos9810-universal_defconfig

    - name: Compile Kernel
      run: |
        cd kernel-src
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-gnu-
        
        # Build configuration (this picks up the appended CONFIG_ lines)
        make exynos9810-universal_defconfig

        # Accept defaults for any NEW Kconfig options non-interactively
        make olddefconfig

        # Compile using all available CPU cores
        make -j$(nproc)

    - name: Package with AnyKernel3
      run: |
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel
        # Clean out generic template image footprints
        rm -f anykernel/Image* anykernel/zImage*
        
        # Copy your fresh compiled build into the zip container
        cp kernel-src/arch/arm64/boot/Image.gz-dtb anykernel/Image.gz-dtb
        
        # Turn off the strict device check block so it installs smoothly on Lineage Recovery
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel/anykernel.sh
        
        # Adjust the flash script block target to point to Samsung's standard boot location
        sed -i 's|block=/dev/block/bootdevice/by-name/boot;|block=/dev/block/by-name/boot;|g' anykernel/anykernel.sh
        
        cd anykernel
        zip -r9 ../Exynos9810-KSU-Next.zip *

    - name: Upload Flashable Kernel Zip
      uses: actions/upload-artifact@v4
      with:
        name: Flashable-Kernel
        path: Exynos9810-KSU-Next.zip
